name: test-and-build
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/cache@v5
        with:
          key: npm-and-bower-${{ hashFiles('package-lock.json') }}
          path: |
            node_modules/
            app/bower_components/
      - run: npm install
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/cache@v5
        with:
          key: npm-and-bower-${{ hashFiles('package-lock.json') }}
          path: |
            node_modules/
            app/bower_components/
      - run: npm install
      - run: npm run build
